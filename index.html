<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SIMID</title>
  <style>
    /*
      Use BODY itself as the overlay — no wrapper div.
      Body is the one element guaranteed to have the iframe's dimensions.
      We make it a flex container and center the card inside it.
    */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
    }

    body {
      width: 100%;
      height: 100%;
      min-height: 100px;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 30px;
      width: 82%;
      max-width: 380px;
      text-align: center;
      position: relative;
    }

    h2 { font-size: 20px; color: #111; margin-bottom: 8px; }
    p  { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 20px; }

    #cta {
      display: block; width: 100%;
      background: #e63946; color: #fff;
      border: none; border-radius: 40px;
      padding: 12px; font-size: 15px; font-weight: bold;
      cursor: pointer; margin-bottom: 8px;
    }

    #skip-btn {
      background: none; border: none;
      color: #aaa; font-size: 12px; cursor: pointer;
    }

    #close-btn {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none;
      font-size: 18px; color: #aaa; cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <button id="close-btn">✕</button>
    <h2>Special Offer</h2>
    <p>Tap below to discover our latest collection.</p>
    <button id="cta">Learn More</button>
    <button id="skip-btn">No thanks</button>
  </div>

<script>
(function() {
  var msgId = 1;
  var sessionId = null;

  function send(type, args, correlationId) {
    var msg = {
      sessionId:   sessionId,
      messageId:   msgId++,
      type:        'SIMID:Creative:' + type,
      messageName: 'SIMID:Creative:' + type,
      timestamp:   Date.now(),
      version:     '1.1',
      args:        args || {}
    };
    if (correlationId != null) msg.correlationId = correlationId;
    window.parent.postMessage(msg, '*');
  }

  function hide() {
    document.body.style.display = 'none';
  }

  window.addEventListener('message', function(e) {
    var d = e.data;
    if (typeof d === 'string') { try { d = JSON.parse(d); } catch(_) { return; } }
    if (!d || !d.type) return;
    var t = d.type.toLowerCase();
    if (t.indexOf('simid') === -1) return;
    if (d.sessionId) sessionId = d.sessionId;
    if (d.messageId != null) send('resolve', {}, d.messageId);
    if (t.indexOf('stop') > -1 || t.indexOf('complete') > -1 || t.indexOf('skip') > -1) hide();
  });

  document.getElementById('cta').onclick = function() {
    send('clickThru', { clickThruUrl: 'https://google.com', id: 'cta' });
    window.open('https://google.com', '_blank');
  };

  document.getElementById('skip-btn').onclick =
  document.getElementById('close-btn').onclick = function() {
    hide();
    send('closeCreative', {});
  };

  /* createSession tells the player the creative is ready */
  window.parent.postMessage({
    sessionId: null, messageId: msgId++,
    type: 'SIMID:Creative:createSession',
    messageName: 'SIMID:Creative:createSession',
    timestamp: Date.now(), version: '1.1', args: {}
  }, '*');

  console.log('[SIMID] body size on load:', document.body.offsetWidth, 'x', document.body.offsetHeight);

  /* Log body size again after a tick in case IMA sets iframe dims async */
  setTimeout(function() {
    console.log('[SIMID] body size after 100ms:', document.body.offsetWidth, 'x', document.body.offsetHeight);
  }, 100);

  setTimeout(function() {
    console.log('[SIMID] body size after 1s:', document.body.offsetWidth, 'x', document.body.offsetHeight);
  }, 1000);

})();
</script>
</body>
</html>
