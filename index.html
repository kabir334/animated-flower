<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SIMID Test Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; }

    #player-wrap {
      position: relative;
      width: 640px;
      height: 360px;
      background: #000;
    }

    #content-video {
      width: 100%; height: 100%;
      display: block;
    }

    /* Ad container sits on top of the video, same size */
    #ad-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* let clicks through to video unless ad is active */
    }

    #ad-container.active {
      pointer-events: all;
    }

    #play-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 12px;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="player-wrap">
    <video id="content-video" playsinline>
      <source src="https://storage.googleapis.com/interactive-media-ads/media/android.mp4" type="video/mp4">
    </video>
    <!-- IMA renders the ad iframe inside this div -->
    <div id="ad-container"></div>
  </div>

  <button id="play-btn">Play Ad</button>
  <div id="status">Click "Play Ad" to start</div>

  <!-- Google IMA HTML5 SDK -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

  <script>
    var video       = document.getElementById('content-video');
    var adContainer = document.getElementById('ad-container');
    var playBtn     = document.getElementById('play-btn');
    var statusEl    = document.getElementById('status');

    var adsLoader, adsManager;

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log('[Player]', msg);
    }

    /* ── 1. Initialise IMA ── */
    function initIMA() {
      var adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, video);
      adDisplayContainer.initialize();

      adsLoader = new google.ima.AdsLoader(adDisplayContainer);
      adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded);
      adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);

      video.addEventListener('ended', function() {
        adsLoader.contentComplete();
      });

      /* ── 2. Request the ad ── */
      var req = new google.ima.AdsRequest();

      /*
       * REPLACE THIS with your own VAST tag URL.
       * This is the Google SIMID sample tag — it uses a creative hosted
       * on googleads.github.io so VSI works with it.
       * Your Netlify-hosted creative will work fine here because this
       * page sends postMessage with targetOrigin:'*', not locked to github.io
       */
      req.adTagUrl =
        'https://pubads.g.doubleclick.net/gampad/ads?' +
        'iu=/21775744923/external/simid_test&' +
        'description_url=https%3A%2F%2Fdevelopers.google.com&' +
        'tfcd=0&npa=0&sz=640x480&gdfp_req=1&output=vast&' +
        'unviewed_position_start=1&env=vp&impl=s&correlator=';

      req.linearAdSlotWidth  = 640;
      req.linearAdSlotHeight = 360;
      req.nonLinearAdSlotWidth  = 640;
      req.nonLinearAdSlotHeight = 360;

      adsLoader.requestAds(req);
      setStatus('Requesting ad...');
    }

    /* ── 3. Ads manager loaded ── */
    function onAdsManagerLoaded(e) {
      adsManager = e.getAdsManager(video);
      adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
      adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, onAllAdsCompleted);
      adsManager.addEventListener(google.ima.AdEvent.Type.STARTED, function() {
        setStatus('Ad playing...');
        adContainer.classList.add('active');
      });
      adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE, function() {
        setStatus('Ad complete. Playing content.');
        adContainer.classList.remove('active');
        video.play();
      });

      try {
        adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
        adsManager.start();
        setStatus('Ad started.');
      } catch(e) {
        console.error('AdsManager error:', e);
        video.play();
      }
    }

    function onAdError(e) {
      setStatus('Ad error: ' + e.getError());
      console.error('Ad error:', e.getError());
      if (adsManager) adsManager.destroy();
      video.play();
    }

    function onAllAdsCompleted() {
      setStatus('All ads complete.');
      adContainer.classList.remove('active');
    }

    /* ── Play button ── */
    playBtn.addEventListener('click', function() {
      playBtn.disabled = true;
      initIMA();
    });
  </script>
</body>
</html>
