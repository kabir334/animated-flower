<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SIMID Overlay Ad</title>
    <style>
        /* 1. LAYOUT: Body is a transparent "ghost" layer */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            background: transparent !important; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
            pointer-events: none; /* Allows clicks to pass through to the video player */
        }

        /* 2. BUTTON: Floating at bottom center */
        #shop-btn-entry {
            display: none; /* Shown on Player:startCreative */
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 34px;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: auto; /* Re-enable clicks for the button */
            transition: transform 0.2s;
        }
        #shop-btn-entry:active { transform: translateX(-50%) scale(0.95); }

        /* 3. MODAL: Full screen darker overlay */
        #modal-overlay {
            display: none;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            position: absolute;
            top: 0; left: 0;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Capture all clicks when modal is open */
        }

        .modal-card {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            position: relative;
        }

        .option-item {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .option-item:hover { background: #e0e0e0; }

        #close-modal {
            margin-top: 15px;
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="shop-btn-entry">SHOP NOW</button>

    <div id="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom: 10px;">Exclusive Styles</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Choose a collection to explore</p>
            
            <div class="option-item" onclick="handleItemClick('Originals')">Originals Series</div>
            <div class="option-item" onclick="handleItemClick('Performance')">Performance Gear</div>
            
            <button id="close-modal">Back to Video</button>
        </div>
    </div>

    <script>
        /**
         * LOGGING WRAPPER
         */
        function log(msg, obj = "") {
            console.log(`%c[SIMID DEBUG]%c ${msg}`, "color: #00ff00; font-weight: bold", "color: #fff", obj);
        }

        let sessionId = btoa(Math.random()).substring(0, 16);
        let msgId = 1;

        function send(type, args = {}, corrId = null) {
            const isProtocol = type === 'resolve' || type === 'reject' || type === 'createSession';
            const name = isProtocol ? type : 'SIMID:Creative:' + type;
        
            const msg = {
                sessionId: sessionId,
                messageId: msgId++,
                type: name,
                timestamp: Date.now(),
                version: "1.0",
                args: args
            };
        
            // For resolves, the player NEEDS the original messageId in the args
            if (corrId) {
                msg.args = { 
                    messageId: corrId, // This points back to the Player's message
                    value: args 
                };
            }
        
            log(`>> SENDING: ${name}`, msg);
            window.parent.postMessage(JSON.stringify(msg), "*");
        }
        window.addEventListener('message', (e) => {
            let data;
            try { 
                data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; 
            } catch (err) { return; }
            if (!data) return;
        
            // Use a unified name check for both 'type' and 'messageName'
            const type = data.type || data.messageName;
            log(`<< RECEIVED: ${type}`, data);
        
            /**
             * 1. THE CRITICAL FIX: Player:init
             * The player hangs here until you resolve this.
             */
            if (type === 'SIMID:Player:init') {
                log("Handshake: Resolving Player:init (Video will start now)");
                send('resolve', {}, data.messageId);
            } 
            
            /**
             * 2. SHOW UI: Player:startCreative
             * The player sends this once the video actually begins.
             */
            else if (type === 'SIMID:Player:startCreative') {
                log("Handshake: Resolving Player:startCreative");
                send('resolve', {}, data.messageId);
                
                // Reveal the button only after the video is officially running
                document.getElementById('shop-btn-entry').style.display = 'block';
            }
        
            /**
             * 3. KEEP-ALIVE: Resolve other player messages
             * Some players require a resolve for 'resize' or 'log' to keep the ad alive.
             */
            else if (data.messageId && type.startsWith('SIMID:Player:')) {
                send('resolve', {}, data.messageId);
            }
        });
        // ──────────────── UI LOGIC ────────────────

        const entryBtn = document.getElementById('shop-btn-entry');
        const modal = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('close-modal');

        // 1. OPEN MODAL & PAUSE
        entryBtn.onclick = () => {
            log("Action: Requesting Pause & Opening Modal");
            send('requestPause'); // Player should pause video
            modal.style.display = 'flex';
            entryBtn.style.display = 'none';
        };

        // 2. CLOSE MODAL & RESUME
        closeBtn.onclick = () => {
            log("Action: Requesting Play & Closing Modal");
            send('requestPlay'); // Player should resume video
            modal.style.display = 'none';
            entryBtn.style.display = 'block';
        };

        // 3. ITEM CLICK (Click-Thru)
        window.handleItemClick = (name) => {
            log(`Action: Click-Thru for ${name}`);
            send('reportTracking', { interactionId: name });
            send('clickThru', {
                clickThruUrl: 'https://www.adidas.com',
                id: name
            });
            window.open('https://www.adidas.com', '_blank');
        };

        // 4. START HANDSHAKE
        send('createSession');
        log("Handshake: createSession sent to player.");
    </script>
</body>
</html>
