<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SIMID Overlay Ad</title>
    <style>
        /* 1. LAYOUT: Body is a transparent "ghost" layer */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            background: transparent !important; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
            pointer-events: none; /* Allows clicks to pass through to the video player */
        }

        /* 2. BUTTON: Floating at bottom center */
        #shop-btn-entry {
            display: none; /* Shown on Player:startCreative */
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            justify-content: center;
            align-items: center;
            background-color: #FF9900;
            color: #111111;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.3s ease;
            pointer-events: auto;
            font-size: 1rem;
            height: 30px;
            padding: 2px 5px;
        }
        #shop-btn-entry:active { transform: translateX(-50%) scale(0.95); }

        #shop-btn-entry:hover {
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 3. MODAL: Full screen darker overlay */
        #modal-overlay {
            display: none;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            position: absolute;
            top: 0; left: 0;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Capture all clicks when modal is open */
        }

       #modal-overlay {
        display: none;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); /* Dark dim effect */
        position: absolute; top: 0; left: 0;
        justify-content: center; align-items: center;
        pointer-events: auto; z-index: 20;
    }

    /* The Responsive Modal Card */
    .modal-card {
        width: 80%; /* 80% Width as requested */
        height: 90%; /* Leaves a little breathing room at top/bottom */
        max-width: 1200px;
        background: #fff;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Vudoo Container Area */
    #vudoo-app-container {
        flex: 1; /* Takes all available space minus the button */
        width: 100%;
        background: #000; /* Black background for 16:9 letterboxing */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Ensure the Vudoo Iframe stays centered and responsive */
    #vudoo-app-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        object-fit: contain; /* Respects aspect ratio */
    }

    /* Close Button Styling */
    #close-modal {
        padding: 5px 0;
        width: 100%;
        background: #f8f8f8;
        border: none;
        border-top: 1px solid #eee;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        transition: background 0.3s;
    }
    #close-modal:hover {
        background: #ffe3e3;
        color: #d62828;
    }


    </style>
</head>
<body>

    <button id="shop-btn-entry">
        <div class="shop-with-amazon-button" id="amazon-btn"></div>
    </button>

    <div id="modal-overlay">
        <div class="modal-card">
            <div id="vudoo-app-container"></div>
            <button id="close-modal">CLOSE & RESUME VIDEO</button>
        </div>
    </div>

    <script type="module" src="script.js">
        
    </script>
</body>
</html>
