<!DOCTYPE html>
<html>
<head>
    <title>WORKING SIMID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
        #ad-layer {
            display: none; /* Hidden until Player:start */
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: rgba(255, 0, 0, 0.5); /* Red tint so you SEE it */
            color: white; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="ad-layer">
        <h1>SIMID IS WORKING!</h1>
        <button id="cta" style="padding:20px;">CLICK ME</button>
    </div>

    <script>
        (function() {
            let sessionId = null;
            let msgId = 1;

            // The absolute simplest send function
            function send(name, msgIdToResolve) {
                const msg = {
                    sessionId: sessionId,
                    messageId: msgId++,
                    messageName: "SIMID:Creative:" + name,
                    timestamp: Date.now(),
                    args: {}
                };
                if (msgIdToResolve) msg.correlationId = msgIdToResolve;
                window.parent.postMessage(msg, "*");
                console.log(">> SENT:", name);
            }

            window.addEventListener('message', (event) => {
                let data = event.data;
                if (typeof data === 'string') {
                try {
                        data = JSON.parse(data);
                    } catch (e) {
                        console.error("[script] Could not parse JSON string:", e);
                        return; // Not a valid SIMID message
                    }
                }
            
                console.log("[script] Received Object:", data);
            
                // 2. Normalize the message name (handling both 'type' and 'messageName')
                const msgName = data.messageName || data.type;
                if (!msgName) return;
            
                // 3. Update Session ID
                if (data.sessionId) sessionId = data.sessionId;
            
                // 4. IAB Response Logic
                switch (msgName) {
                    case 'SIMID:Media:play':
                        send('resolve', data.messageId);
                        break;
                    case 'SIMID:Media:start':
                        send('resolve', data.messageId);
                        // SHOW THE AD
                        document.getElementById('ad-layer').style.display = 'flex';
                        break;
                    case 'SIMID:Media:adStopped':
                        send('resolve', data.messageId);
                        break;
                    default:
                        if (data.messageId) send('resolve', data.messageId);
                        break;
                }
            });

            // START THE HANDSHAKE
            window.parent.postMessage({
                messageId: msgId++,
                messageName: 'SIMID:Creative:createSession',
                timestamp: Date.now(),
                args: {}
            }, "*");
        })();
    </script>
</body>
</html>
