<!DOCTYPE html>
<html>
<head>
    <title>WORKING SIMID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
        #ad-layer {
            display: none; /* Hidden until Player:start */
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: rgba(255, 0, 0, 0.5); /* Red tint so you SEE it */
            color: white; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="ad-layer">
        <h1>SIMID IS WORKING!</h1>
        <button id="cta" style="padding:20px;">CLICK ME</button>
    </div>

    <script>
        (function() {
            let sessionId = null;
            let msgId = 1;
        
            function send(name, resolveId = undefined) {
                const msg = {
                    sessionId: sessionId,
                    messageId: msgId++,
                    messageName: "SIMID:Creative:" + name, // Using standard naming
                    type: "SIMID:Creative:" + name,        // Using Google-friendly naming
                    timestamp: Date.now(),
                    version: "1.0",
                    args: {}
                };
                if (resolveId) msg.correlationId = resolveId;
                window.parent.postMessage(msg, "*");
                console.log(">> SENT:", name);
            }
        
            window.addEventListener('message', (event) => {
                let data = event.data;
                if (typeof data === 'string') {
                    try { data = JSON.parse(data); } catch (e) { return; }
                }
                if (!data) return;
        
                const incomingName = data.messageName || data.type;
                console.log("<< RECV:", incomingName, data);
        
                // 1. CAPTURE THE ID: This stops the loop!
                if (data.sessionId) {
                    sessionId = data.sessionId;
                    console.log("✅ SESSION ESTABLISHED:", sessionId);
                }
        
                // 2. RESPOND TO THE PLAYER
                if (incomingName.includes('Player:init')) {
                    send('resolve', data.messageId);
                } 
                else if (incomingName.includes('Player:start')) {
                    send('resolve', data.messageId);
                    // FINALLY SHOW THE UI
                    document.getElementById('ad-layer').style.display = 'flex';
                }
                else if (data.messageId) {
                    // Always resolve status updates like 'timeupdate'
                    send('resolve', data.messageId);
                }
            });
        
            // 3. THE HEARTBEAT: Keep asking for a session until you get one
            const handshakeInterval = setInterval(() => {
                if (sessionId) {
                    clearInterval(handshakeInterval);
                    return;
                }
                console.log("🔄 Requesting createSession...");
                window.parent.postMessage({
                    messageId: msgId++,
                    messageName: 'SIMID:Creative:createSession',
                    type: 'SIMID:Creative:createSession',
                    timestamp: Date.now(),
                    version: "1.0",
                    args: {}
                }, "*");
            }, 1000);
        })();
    </script>
</body>
</html>
