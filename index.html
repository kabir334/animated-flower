<!DOCTYPE html>
<html>
<head>
    <title>WORKING SIMID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
        #ad-layer {
            display: none; /* Hidden until Player:start */
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: rgba(255, 0, 0, 0.5); /* Red tint so you SEE it */
            color: white; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="ad-layer">
        <h1>SIMID IS WORKING!</h1>
        <button id="cta" style="padding:20px;">CLICK ME</button>
    </div>

    <script>
        (function() {
            let sessionId = btoa(Math.random()).substring(0, 16); // Simple unique ID
    let msgId = 1;

    // 1. The Core Sending Logic (Must be Stringified)
    function send(type, args = {}, corrId = null) {
        const msg = {
            sessionId: sessionId,
            messageId: msgId++,
            type: type,
            timestamp: Date.now(),
            args: corrId ? { messageId: corrId, value: args } : args
        };
        window.parent.postMessage(JSON.stringify(msg), "*");
    }

    // 2. The Handshake Logic
    window.addEventListener('message', (e) => {
        let data;
        try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch (err) { return; }
        if (!data || !data.type) return;

        const type = data.type;

        // If Player sends INIT, we RESOLVE it
        if (type === 'SIMID:Player:init') {
            send('resolve', {}, data.messageId);
        } 
        // If Player sends START, we RESOLVE and SHOW
        else if (type === 'SIMID:Player:startCreative') {
            send('resolve', {}, data.messageId);
            document.getElementById('overlay').style.display = 'flex';
        }
    });

    // 3. The "First Move" (Create Session)
    // Sending the message as 'createSession' (no prefix) is the IAB standard
    window.parent.postMessage(JSON.stringify({
        sessionId: sessionId,
        messageId: msgId++,
        type: 'createSession',
        timestamp: Date.now(),
        args: {}
    }), "*");
        })();
    </script>
</body>
</html>
