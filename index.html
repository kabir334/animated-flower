<!DOCTYPE html>
<html>
<head>
    <title>WORKING SIMID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
        #ad-layer {
            display: none; /* Hidden until Player:start */
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: rgba(255, 0, 0, 0.5); /* Red tint so you SEE it */
            color: white; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="ad-layer">
        <h1>SIMID IS WORKING!</h1>
        <button id="cta" style="padding:20px;">CLICK ME</button>
    </div>

    <script>
        (function() {
            console.log("🚩 CHECKPOINT 1: Script started");

var sessionId = null;
var msgId = 1;

// 1. Unified Send Function
function sendToPlayer(name, correlationId) {
    var msg = {
        sessionId: sessionId,
        messageId: msgId++,
        messageName: "SIMID:Creative:" + name,
        type: "SIMID:Creative:" + name,
        timestamp: Date.now(),
        version: "1.0",
        args: {}
    };
    if (correlationId) msg.correlationId = correlationId;
    
    console.log(">> SENDING msg to:", name);
    window.parent.postMessage(msg, "*");
}

// 2. Robust Listener
window.addEventListener('message', function(event) {
    var data = event.data;
    
    // Handle String vs Object
    if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch(e) { return; }
    }
    
    if (!data) return;
    console.log("<< RECEIVED:", (data.messageName || data.type), data);

    // Capture Session ID
    if (data.sessionId) {
        sessionId = data.sessionId;
    }

    // Resolve EVERYTHING the player sends to keep it happy
    if (data.messageId) {
        sendToPlayer("resolve", data.messageId);
    }

    // Show UI on Start
    var name = (data.messageName || data.type || "");
    if (name.indexOf("Player:start") !== -1) {
        var el = document.getElementById('ad-layer');
        if (el) el.style.display = 'flex';
    }
});

console.log("🚩 CHECKPOINT 2: Listener attached");

// 3. The Handshake Loop
var handshake = setInterval(function() {
    if (sessionId) {
        console.log("✅ Handshake stopped. Session active.");
        clearInterval(handshake);
        return;
    }
    
    console.log("🔄 CHECKPOINT 3: Requesting createSession...");
    window.parent.postMessage({
        messageId: msgId++,
        messageName: 'SIMID:Creative:createSession',
        type: 'SIMID:Creative:createSession',
        timestamp: Date.now(),
        version: "1.0",
        args: {}
    }, "*");
}, 1000);
        })();
    </script>
</body>
</html>
