<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SIMID</title>
  <style>
    /* Reset everything */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /*
      Fill the iframe completely.
      The player sets the iframe to the video player size.
      We match it exactly using position:absolute + inset:0
      which is more reliable than 100vh inside a sandboxed iframe.
    */
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Visible by default — no waiting for JS.
         Once SIMID events confirm ad started, JS keeps it shown.
         This way even if messages are missed it still shows. */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 85%;
      max-width: 400px;
      text-align: center;
    }

    .card h2 { font-size: 20px; color: #111; margin-bottom: 8px; }
    .card p  { font-size: 14px; color: #555; margin-bottom: 20px; }

    #cta {
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }

    #skip {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="card">
      <h2>Special Offer</h2>
      <p>Tap below to learn more about this exclusive deal.</p>
      <button id="cta">Learn More</button>
      <button id="skip">Skip</button>
    </div>
  </div>

<script>
(function() {
  var msgId = 1;
  var sessionId = null;

  function send(type, args, correlationId) {
    var msg = {
      sessionId:   sessionId,
      messageId:   msgId++,
      type:        'SIMID:Creative:' + type,
      messageName: 'SIMID:Creative:' + type,
      timestamp:   Date.now(),
      version:     '1.1',
      args:        args || {}
    };
    if (correlationId != null) msg.correlationId = correlationId;
    window.parent.postMessage(msg, '*');
    console.log('[SIMID >>]', msg.type);
  }

  window.addEventListener('message', function(e) {
    var d = e.data;
    if (typeof d === 'string') { try { d = JSON.parse(d); } catch(_) { return; } }
    if (!d || !d.type) return;

    var t = d.type.toLowerCase();
    console.log('[SIMID <<]', d.type);

    if (d.sessionId) sessionId = d.sessionId;

    /* Always resolve every message */
    if (d.messageId != null) send('resolve', {}, d.messageId);

    /* Hide on end */
    if (t.indexOf('stop') > -1 || t.indexOf('complete') > -1 || t.indexOf('skip') > -1) {
      document.getElementById('overlay').style.display = 'none';
    }
  });

  document.getElementById('cta').onclick = function() {
    send('clickThru', { clickThruUrl: 'https://google.com', id: 'cta' });
    window.open('https://google.com', '_blank');
  };

  document.getElementById('skip').onclick = function() {
    document.getElementById('overlay').style.display = 'none';
    send('closeCreative', {});
  };

  /* Tell player we exist */
  send('createSession', {});

  console.log('[SIMID] ready');
})();
</script>
</body>
</html>
