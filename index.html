<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SIMID Overlay Ad</title>
    <style>
        /* 1. LAYOUT: Body is a transparent "ghost" layer */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            background: transparent !important; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
            pointer-events: none; /* Allows clicks to pass through to the video player */
        }

        /* 2. BUTTON: Floating at bottom center */
        #shop-btn-entry {
            display: none; /* Shown on Player:startCreative */
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 34px;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: auto; /* Re-enable clicks for the button */
            transition: transform 0.2s;
        }
        #shop-btn-entry:active { transform: translateX(-50%) scale(0.95); }

        /* 3. MODAL: Full screen darker overlay */
        #modal-overlay {
            display: none;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            position: absolute;
            top: 0; left: 0;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Capture all clicks when modal is open */
        }

        /* Vudoo Container */
        #vudoo-app-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        #close-modal {
            margin-top: 15px;
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="shop-btn-entry">SHOP NOW</button>

    <div id="modal-overlay">
        <div class="modal-card">
            <div id="vudoo-app-container"></div>
            <button id="close-modal">CLOSE & RESUME VIDEO</button>
        </div>
    </div>

    <script type="module" src="script.js">
        
    </script>
</body>
</html>
