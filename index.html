<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SIMID</title>
  <style>
    /* Reset everything */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /*
      Fill the iframe completely.
      The player sets the iframe to the video player size.
      We match it exactly using position:absolute + inset:0
      which is more reliable than 100vh inside a sandboxed iframe.
    */
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Visible by default — no waiting for JS.
         Once SIMID events confirm ad started, JS keeps it shown.
         This way even if messages are missed it still shows. */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 85%;
      max-width: 400px;
      text-align: center;
    }

    .card h2 { font-size: 20px; color: #111; margin-bottom: 8px; }
    .card p  { font-size: 14px; color: #555; margin-bottom: 20px; }

    #cta {
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }

    #skip {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Special Offer</h2>
      <p>Tap below to learn more about this exclusive deal.</p>
      <button id="cta">Learn More</button>
      <button id="skip">Skip</button>
    </div>
  </div>

<script>
(function() {
  const overlay = document.getElementById('overlay');
  let sessionStarted = false;

  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data) return;

    // 1. FORCE THE SESSION
    // Whenever the player talks (like timeupdate), we shout back "START ME"
    window.parent.postMessage({
      messageName: 'SIMID:Creative:createSession',
      messageId: 100, // Dummy ID
      timestamp: Date.now(),
      version: "1.0",
      args: {}
    }, "*");

    // 2. FORCE THE RESOLVE
    // If the player sent a message with an ID, we tell it "Resolved" immediately
    if (data.messageId) {
      window.parent.postMessage({
        sessionId: data.sessionId || null,
        messageId: 200,
        correlationId: data.messageId,
        messageName: 'SIMID:Creative:resolve',
        timestamp: Date.now(),
        args: {}
      }, "*");
    }

    // 3. FORCE THE VISIBILITY
    // The moment we see "start" OR after 2 seconds of any player activity
    if (!sessionStarted) {
       overlay.style.display = 'block';
       sessionStarted = true;
       console.log("Overlay forced visible!");
    }
  });
})();
</script>
</body>
</html>
